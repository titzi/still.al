<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>still.al</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000'/><text x='16' y='23' font-family='serif' font-size='16' font-weight='bold' fill='%23ccc' text-anchor='middle'>al</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap">
<style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Layer 1: Photo backgrounds ─────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: grayscale(0.5) contrast(1.4) brightness(0.55);
      opacity: 0.3;
    }
    .bg1 { background-color: #0a0a0a; background-image: url('images/bg1.jpg'); opacity: 0; }
    .bg2 { background-image: url('images/bg2.jpg'); mix-blend-mode: lighten; }

    /* ── Layer 2: Animated grain canvas ─────────────────────────── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: screen;
    }

    /* ── Layer 3: Scanlines ──────────────────────────────────────── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.28) 3px,
        rgba(0, 0, 0, 0.28) 4px
      );
    }

    /* ── Center stage ────────────────────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    /* ── Glitch text ─────────────────────────────────────────────── */
    .glitch {
      position: absolute;
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.7rem, 10.5vw, 9rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #bbb;
      -webkit-text-stroke: 1px #000;
      text-transform: lowercase;
      user-select: none;
      white-space: nowrap;
      /* position + drift handled by JS */
    }


    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      font: inherit;
      letter-spacing: inherit;
      -webkit-text-stroke: 0;
    }

    /* Red channel — clips top portion */
    .glitch::before {
      color: #ff0033;
      clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%);
      opacity: 0;
      transform: translate(var(--rx, 0px), var(--ry, 0px)) skewX(var(--rs, 0deg));
    }

    /* Cyan channel — clips bottom portion */
    .glitch::after {
      color: #00e5ff;
      clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%);
      opacity: 0;
      transform: translate(var(--cx, 0px), var(--cy, 0px)) skewX(var(--cs, 0deg));
    }

    .glitch.pop::before { opacity: 1; }
    .glitch.pop::after  { opacity: 1; }
  </style>
</head>
<body>

<audio id="snd" preload="auto">
    <source src="audio/track.mp3" type="audio/mpeg">
    <source src="audio/track.ogg" type="audio/ogg">
  </audio>
  <audio id="hats" preload="auto" loop>
    <source src="audio/hats.mp3" type="audio/mpeg">
    <source src="audio/hats.ogg" type="audio/ogg">
  </audio>

  <div class="bg bg1"></div>
  <div class="bg bg2"></div>
  <canvas id="grain"></canvas>
  <div class="scanlines"></div>

  <div class="stage">
    <h1 class="glitch" data-text="still.al">still.al</h1>
  </div>

  <script>
    (function () {
      // Each layer drifts via summed sines at irrational frequency ratios —
      // motion is smooth, continuous, and never repeats.
      var layers = [
        {
          el: document.querySelector('.bg1'),
          wx: [0.00021, 0.00013, 0.000079],
          wy: [0.00017, 0.000091, 0.00023],
          px: [0.0,  1.1, 2.7],
          py: [0.5,  2.3, 0.9],
          ax: [1.4,  0.9, 0.5],
          ay: [1.1,  0.7, 0.6]
        },
        {
          el: document.querySelector('.bg2'),
          wx: [0.00019, 0.000071, 0.00031],
          wy: [0.00023, 0.00011,  0.000061],
          px: [1.3,  0.4, 3.1],
          py: [2.1,  1.7, 0.3],
          ax: [2.4,  1.6, 1.2],
          ay: [2.6,  1.0, 1.4]
        }
      ];

      window._bg2shake = { active: false, x: 0, y: 0 };

      function tick(t) {
        layers.forEach(function (l, i) {
          var x = 0, y = 0;
          for (var j = 0; j < 3; j++) {
            x += Math.sin(t * l.wx[j] + l.px[j]) * l.ax[j];
            y += Math.cos(t * l.wy[j] + l.py[j]) * l.ay[j];
          }
          var shake = (i === 1 && window._bg2shake.active)
            ? ' translate(' + window._bg2shake.x + 'px,' + window._bg2shake.y + 'px)'
            : '';
          l.el.style.transform = 'scale(1.08) translate(' + x + '%, ' + y + '%)' + shake;
        });
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    (function () {
      var canvas = document.getElementById('grain');
      var ctx    = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function drawGrain() {
        var w   = canvas.width;
        var h   = canvas.height;
        var img = ctx.createImageData(w, h);
        var d   = img.data;
        for (var i = 0; i < d.length; i += 4) {
          var v = (Math.random() * 255) | 0;
          d[i]     = v;
          d[i + 1] = v;
          d[i + 2] = v;
          d[i + 3] = 255;
        }
        ctx.putImageData(img, 0, 0);
      }

      resize();
      window.addEventListener('resize', resize);
      setInterval(drawGrain, 100);
      drawGrain();
    })();

    (function () {
      var el  = document.querySelector('.glitch');
      var bg1 = document.querySelector('.bg1');
      var bg2 = document.querySelector('.bg2');
      var amp = 5;
      var visible = true;

      // Fast shake interval for bg2
      setInterval(function () {
        if (window._bg2shake.active) {
          window._bg2shake.x = (Math.random() * 2 - 1) * 10;
          window._bg2shake.y = (Math.random() * 2 - 1) * 10;
        }
      }, 40);

      var snd  = document.getElementById('snd');
      var hats = document.getElementById('hats');
      snd.loop = true;

      function startAudio() {
        snd.play().catch(function () {});
      }
      ['click', 'touchstart', 'keydown'].forEach(function (ev) {
        document.addEventListener(ev, function handler() {
          startAudio();
          document.removeEventListener(ev, handler);
        });
      });

      function placeRandom() {
        var pw = el.offsetWidth  || 300;
        var ph = el.offsetHeight || 80;
        var x = pw * 0.5 + Math.random() * (window.innerWidth  - pw);
        var y = ph * 0.5 + Math.random() * (window.innerHeight - ph);
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
      }

      // Start centered, hidden
      el.style.left    = '50%';
      el.style.top     = '50%';
      el.style.opacity = '0';
      el.style.transform = 'translate(-50%, -50%)';

      function jitter() {
        if (!visible) return;
        var x    = (Math.random() * 2 - 1) * amp;
        var y    = (Math.random() * 2 - 1) * amp;
        var skew = (Math.random() * 2 - 1) * 0.6;
        el.style.transform = 'translate(calc(-50% + ' + x + 'px), calc(-50% + ' + y + 'px)) skewX(' + skew + 'deg)';
      }
      setInterval(jitter, 40);

      function cycle() {
        // hide
        visible = false;
        el.style.opacity = '0';
        bg1.style.opacity = '0';
        window._bg2shake.active = false;
        bg2.style.filter = '';
        hats.pause();
        // Pre-seek during the hidden gap so play() fires instantly on appearance
        hats.playbackRate = Math.random() < 0.5 ? 2 : 3;
        if (hats.readyState >= 2 && hats.duration) {
          hats.currentTime = Math.random() * hats.duration;
        }
        setTimeout(function () {
          placeRandom();
          visible = true;
          el.style.opacity = '1';
          bg1.style.opacity = '0.3';
          window._bg2shake.active = true;
          bg2.style.filter = 'grayscale(1) contrast(1.4) brightness(0.55)';
          hats.play().catch(function () {});
          var showFor = Math.random() < 0.5
            ? 50  + Math.random() * 150   // short flash
            : 900 + Math.random() * 3500; // longer appearance
          setTimeout(cycle, showFor);
        }, 3000 + Math.random() * 8000);
      }
      setTimeout(cycle, 3000);

      function r(range) { return (Math.random() * 2 - 1) * range; }

      function chromaPop() {
        el.style.setProperty('--rx', r(10) + 'px');
        el.style.setProperty('--ry', r(4)  + 'px');
        el.style.setProperty('--rs', r(7)  + 'deg');
        el.style.setProperty('--cx', r(10) + 'px');
        el.style.setProperty('--cy', r(4)  + 'px');
        el.style.setProperty('--cs', r(7)  + 'deg');
        el.classList.add('pop');
        setTimeout(function () {
          el.classList.remove('pop');
          setTimeout(chromaPop, 80 + Math.random() * 600);
        }, 40 + Math.random() * 140);
      }
      chromaPop();
    })();
  </script>

</body>
</html>
