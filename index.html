<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>still.al</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000'/><text x='16' y='23' font-family='serif' font-size='16' font-weight='bold' fill='%23ccc' text-anchor='middle'>al</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Background layers ───────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: grayscale(0.5) contrast(1.4) brightness(0.55);
      opacity: 0.3;
    }
    .bg1 {
      background-color: #0a0a0a;
      background-image: url('images/bg1.jpg');
      opacity: 0;
    }
    .bg2 {
      background-image: url('images/bg2.jpg');
      mix-blend-mode: lighten;
      opacity: 0;
      transition: opacity 7s ease, filter 0.08s ease;
      /* filter: grayscale(1) contrast(1.4) brightness(0.55); */
    }

    /* ── Grain canvas ────────────────────────────────────────────── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: screen;
      /* transition: opacity 0.08s ease; */
    }

    /* ── Scanlines ───────────────────────────────────────────────── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.28) 3px,
        rgba(0, 0, 0, 0.28) 4px
      );
    }

    /* ── Stage ───────────────────────────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    /* ── Glitch text ─────────────────────────────────────────────── */
    .glitch {
      position: absolute;
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2.7rem, 10.5vw, 9rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      -webkit-text-stroke: 1px #000;
      text-stroke: 1px #000;
      text-transform: lowercase;
      user-select: none;
      white-space: nowrap;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      font: inherit;
      letter-spacing: inherit;
      -webkit-text-stroke: 0px transparent;
      text-stroke: 0px transparent;
    }

    .glitch::before {
      color: #ff0033;
      clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%);
      opacity: 0;
      transform: translate(var(--rx, 0px), var(--ry, 0px)) skewX(var(--rs, 0deg));
    }

    .glitch::after {
      color: #00e5ff;
      clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%);
      opacity: 0;
      transform: translate(var(--cx, 0px), var(--cy, 0px)) skewX(var(--cs, 0deg));
    }

    .glitch.pop::before { opacity: 1; }
    .glitch.pop::after  { opacity: 1; }

    @-moz-document url-prefix() {
      .glitch {
        -webkit-text-stroke: 0.3px #000;
      }
    }

    /* ── Enter screen ────────────────────────────────────────────── */
    #enter {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 2s ease;
    }
    #enter a {
      font-family: 'UnifrakturMaguntia', sans-serif;
      font-size: clamp(4rem, 9vw, 6rem);
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.15em;
      user-select: none;
      display: inline-block;
      transform: rotate(180deg);
      transition: transform 0.4s ease;
      opacity: 0.2;
    }
  </style>
</head>
<body>

  <audio id="snd" preload="auto">
    <source src="audio/track.mp3" type="audio/mpeg">
    <source src="audio/track.ogg" type="audio/ogg">
  </audio>
  <audio id="hats" preload="auto" loop>
    <source src="audio/hats.mp3" type="audio/mpeg">
    <source src="audio/hats.ogg" type="audio/ogg">
  </audio>
  <audio id="noise" preload="auto" loop>
    <source src="audio/noise.mp3" type="audio/mpeg">
    <source src="audio/noise.ogg" type="audio/ogg">
  </audio>
  <audio id="noise2" preload="auto" loop>
    <source src="audio/noise.mp3" type="audio/mpeg">
    <source src="audio/noise.ogg" type="audio/ogg">
  </audio>

  <div class="bg bg1"></div>
  <div class="bg bg2"></div>
  <canvas id="grain"></canvas>
  <div class="scanlines"></div>

  <div class="stage">
    <h1 class="glitch" data-text="still.al">still.al</h1>
  </div>

  <div id="enter">
    <a href="#">&blacktriangleleft;</a>
  </div>

  <script>
  (function () {

    // ── Elements ──────────────────────────────────────────────────
    var el    = document.querySelector('.glitch');
    var bg1   = document.querySelector('.bg1');
    var bg2   = document.querySelector('.bg2');
    var snd   = document.getElementById('snd');
    snd.loop  = true;
    var hats   = document.getElementById('hats');
    var noise  = document.getElementById('noise');
    var noise2 = document.getElementById('noise2');
    var enter  = document.getElementById('enter');

    // ── Background drift (summed sines, never repeats) ────────────
    var bgLayers = [
      {
        el: bg1,
        wx: [0.00021, 0.00013, 0.000079], wy: [0.00017, 0.000091, 0.00023],
        px: [0.0, 1.1, 2.7],              py: [0.5, 2.3, 0.9],
        ax: [1.4, 0.9, 0.5],              ay: [1.1, 0.7, 0.6]
      },
      {
        el: bg2,
        wx: [0.00019, 0.000071, 0.00031], wy: [0.00023, 0.00011, 0.000061],
        px: [1.3, 0.4, 3.1],              py: [2.1, 1.7, 0.3],
        ax: [2.4, 1.6, 1.2],              ay: [2.6, 1.0, 1.4]
      }
    ];

    var shake = { active: false, x: 0, y: 0 };

    // ── bg2 color flicker ─────────────────────────────────────────
    var bg2BaseFilter  = '';
    var bg2Flickering  = false;

    function setBg2Filter(f) {
      bg2BaseFilter      = f;
      bg2.style.filter   = f;
    }

    function flickerBg2() {
      if (!bg2Flickering) return;
      // brief color flash
      bg2.style.filter     = 'grayscale(0) contrast(1.4) brightness(0.55)';
      canvas.style.opacity = '0.1';
      noise.pause();
      noise2.pause();
      setTimeout(function () {
        bg2.style.filter     = bg2BaseFilter;
        canvas.style.opacity = '';
        noise.play().catch(function () {});
        noise2.play().catch(function () {});
        // stay in grayscale 3–9× longer than the color flash
        setTimeout(flickerBg2, 1200 + Math.random() * 5000);
      }, 60 + Math.random() * 220);
    }

    function bgTick(t) {
      bgLayers.forEach(function (l, i) {
        var x = 0, y = 0;
        for (var j = 0; j < 3; j++) {
          x += Math.sin(t * l.wx[j] + l.px[j]) * l.ax[j];
          y += Math.cos(t * l.wy[j] + l.py[j]) * l.ay[j];
        }
        var s = (i === 1 && shake.active)
          ? ' translate(' + shake.x + 'px,' + shake.y + 'px)' : '';
        l.el.style.transform = 'scale(1.08) translate(' + x + '%, ' + y + '%)' + s;
      });
      requestAnimationFrame(bgTick);
    }
    requestAnimationFrame(bgTick);

    // ── Grain canvas ──────────────────────────────────────────────
    var canvas = document.getElementById('grain');
    var ctx    = canvas.getContext('2d');

    function resizeGrain() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    function drawGrain() {
      var w = canvas.width, h = canvas.height;
      var img = ctx.createImageData(w, h);
      var d = img.data;
      for (var i = 0; i < d.length; i += 4) {
        var v = (Math.random() * 255) | 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
    }
    resizeGrain();
    window.addEventListener('resize', resizeGrain);
    setInterval(drawGrain, 100);
    drawGrain();

    // ── Text jitter ───────────────────────────────────────────────
    var visible = false;

    el.style.left    = '50%';
    el.style.top     = '50%';
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -50%)';

    setInterval(function () {
      if (!visible) return;
      var x    = (Math.random() * 2 - 1) * 5;
      var y    = (Math.random() * 2 - 1) * 5;
      var skew = (Math.random() * 2 - 1) * 0.6;
      el.style.transform = 'translate(calc(-50% + ' + x + 'px), calc(-50% + ' + y + 'px)) skewX(' + skew + 'deg)';
    }, 40);

    // Shake bg2 while text is visible
    setInterval(function () {
      if (!shake.active) return;
      shake.x = (Math.random() * 2 - 1) * 10;
      shake.y = (Math.random() * 2 - 1) * 10;
    }, 40);

    // ── Chroma pop ────────────────────────────────────────────────
    function r(range) { return (Math.random() * 2 - 1) * range; }

    function chromaPop() {
      el.style.setProperty('--rx', r(10) + 'px');
      el.style.setProperty('--ry', r(4)  + 'px');
      el.style.setProperty('--rs', r(7)  + 'deg');
      el.style.setProperty('--cx', r(10) + 'px');
      el.style.setProperty('--cy', r(4)  + 'px');
      el.style.setProperty('--cs', r(7)  + 'deg');
      el.classList.add('pop');
      setTimeout(function () {
        el.classList.remove('pop');
        setTimeout(chromaPop, 80 + Math.random() * 600);
      }, 40 + Math.random() * 140);
    }
    chromaPop();

    // ── Show/hide cycle ───────────────────────────────────────────
    function placeRandom() {
      var pw = el.offsetWidth  || 300;
      var ph = el.offsetHeight || 80;
      el.style.left = (pw * 0.5 + Math.random() * (window.innerWidth  - pw)) + 'px';
      el.style.top  = (ph * 0.5 + Math.random() * (window.innerHeight - ph)) + 'px';
    }

    function cycle() {
      visible = false;
      el.style.opacity  = '0';
      bg1.style.opacity = '0';
      shake.active      = false;
      setBg2Filter('grayscale(1) contrast(1.4) brightness(0.55)');
      hats.pause();

      hats.playbackRate = 1;

      function playHatsFromRandom() {
        if (hats.duration) {
          hats.currentTime = Math.random() * hats.duration;
        }
        hats.play().catch(function () {});
      }

      setTimeout(function () {
        placeRandom();
        visible = true;
        el.style.opacity  = '1';
        bg1.style.opacity = '0.3';
        shake.active      = true;
        setBg2Filter('grayscale(1) contrast(1.4) brightness(0.55)');
        if (hats.readyState >= 1 && hats.duration) {
          playHatsFromRandom();
        } else {
          hats.addEventListener('loadedmetadata', playHatsFromRandom, { once: true });
          hats.load();
        }
        var showFor = Math.random() < 0.5
          ? 50  + Math.random() * 150
          : 900 + Math.random() * 1500;
        setTimeout(cycle, showFor);
      }, 3000 + Math.random() * 8000);
    }

    // ── Enter drift ───────────────────────────────────────────────
    var enterLink = enter.querySelector('a');
    var enterFlick = false;
    setInterval(function () {
      if (enterFlick) {
        enterFlick = false;
        return;
      }
      if (Math.random() < 0.04) {
        enterFlick = true;
        var x = (Math.random() * 2 - 1) * 70;
        var y = (Math.random() * 2 - 1) * 70;
        enterLink.style.transform = 'rotate(180deg) translate(' + x + 'px,' + y + 'px)';
        return;
      }
      var x = (Math.random() * 2 - 1) * 15;
      var y = (Math.random() * 2 - 1) * 15;
      enterLink.style.transform = 'rotate(180deg) translate(' + x + 'px,' + y + 'px)';
    }, 30);

    // ── Enter ─────────────────────────────────────────────────────
    enter.addEventListener('click', function (e) {
      e.preventDefault();
      enter.style.opacity       = '0';
      enter.style.pointerEvents = 'none';
      setTimeout(function () { enter.style.display = 'none'; }, 1000);
      bg2.style.opacity   = '0.3';
      setBg2Filter('grayscale(1) contrast(1.4) brightness(0.55)');
      bg2Flickering = true;
      setTimeout(flickerBg2, 1500 + Math.random() * 2000);
      // unlock hats for iOS (must call play() inside user gesture)
      hats.muted = true;
      hats.play().then(function () { hats.pause(); hats.currentTime = 0; hats.muted = false; }).catch(function () { hats.muted = false; });
      noise.volume  = 0;
      noise2.volume = 0;
      noise.play().catch(function () {});
      // start noise2 offset by half the track so they never loop at the same time
      var startNoise2 = function () {
        var half = noise.duration ? noise.duration / 2 : 15;
        noise2.currentTime = half;
        noise2.play().catch(function () {});
      };
      if (noise.readyState >= 1) {
        startNoise2();
      } else {
        noise.addEventListener('loadedmetadata', startNoise2, { once: true });
      }
      (function fadeNoise() {
        if (noise.volume < 1) {
          noise.volume  = Math.min(1, noise.volume  + 0.01);
          noise2.volume = Math.min(1, noise2.volume + 0.01);
          setTimeout(fadeNoise, 80);
        }
      })();
      setTimeout(function () {
        snd.play().catch(function () {});
      }, 1500);
      setTimeout(cycle, 1500);
    });

  })();
  </script>

</body>
</html>
